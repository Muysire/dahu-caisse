<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dahu Caisse — Gestion de stock</title>
<style>
/* ============================================================
   DAHU CAISSE — Application complète en un seul fichier
   Direction artistique : violet néon UV / noir violace
   ============================================================ */
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Ubuntu+Mono:wght@400;700&display=swap');

:root{
  --violet:#7c3aed; --violet-light:#a78bfa; --violet-glow:#8b5cf6; --violet-deep:#4c1d95;
  --link-blue:#5eb3ff; --bg:#0a0710; --card:#120d1c; --card-2:#160f24; --card-border:#241a38;
  --text:#f2eefb; --text-muted:#9a8fb0; --ok:#22c55e; --low:#f59e0b; --out:#ef4444;
  --fd:'Bebas Neue',sans-serif; --fb:'Rajdhani',sans-serif; --fm:'Ubuntu Mono',monospace;
  --radius:14px; --glow:0 0 22px rgba(124,58,237,.45); --glow-lg:0 0 32px rgba(167,139,250,.55);
  --shadow:0 8px 30px rgba(124,58,237,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;overflow-x:hidden;font-size:16px}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(circle at 15% 0%,rgba(124,58,237,.16) 0%,transparent 45%),radial-gradient(circle at 85% 100%,rgba(76,29,149,.18) 0%,transparent 50%)}
a{color:var(--link-blue);text-decoration:none}
h1,h2,h3{font-family:var(--fd);font-weight:400;letter-spacing:1px;line-height:1}
.fd{font-family:var(--fd);letter-spacing:1px} .fm{font-family:var(--fm)}
.muted{color:var(--text-muted)} .center{text-align:center} .violet-text{color:var(--violet-light)}
.hidden{display:none!important}
.row{display:flex;align-items:center} .between{justify-content:space-between} .wrap{flex-wrap:wrap}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.grid{display:grid;gap:16px}
.mono{font-family:var(--fm)}
.pill{font-size:10px;font-weight:700;text-transform:uppercase;background:rgba(124,58,237,.2);color:var(--violet-light);padding:2px 7px;border-radius:6px;letter-spacing:.5px}

/* bandeaux */
.banner{height:6px;background:linear-gradient(90deg,var(--violet-deep),var(--violet),var(--violet-light),var(--violet),var(--violet-deep))}
.divider{height:3px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--violet),var(--violet-light),var(--violet),transparent);margin:14px 0}

/* logo */
.logo{display:inline-flex;align-items:center;gap:12px}
.logo-mark{width:46px;height:46px;border-radius:50%;border:2px solid var(--violet);display:grid;place-items:center;font-family:var(--fd);font-size:26px;color:var(--violet-light);background:radial-gradient(circle at 50% 40%,rgba(139,92,246,.25),transparent 70%);filter:drop-shadow(0 0 12px rgba(139,92,246,.5))}
.logo-mark.lg{width:96px;height:96px;font-size:54px}
.logo-text .l1{font-family:var(--fd);font-size:22px;letter-spacing:3px;color:var(--violet-light);line-height:1}
.logo-text .l2{font-family:var(--fm);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted)}

/* boutons */
.btn{font-family:var(--fb);font-weight:700;text-transform:uppercase;letter-spacing:.5px;border:1px solid var(--violet);background:var(--violet);color:#fff;border-radius:10px;padding:10px 18px;cursor:pointer;transition:transform .08s,background .15s,box-shadow .15s,opacity .15s;box-shadow:var(--glow);display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:15px}
.btn:hover{background:var(--violet-glow)} .btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn.secondary{background:var(--card);color:var(--violet-light);box-shadow:none}
.btn.secondary:hover{background:rgba(124,58,237,.18)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text-muted);box-shadow:none}
.btn.ghost:hover{color:var(--violet-light)}
.btn.danger{background:var(--out);border-color:var(--out);box-shadow:none}
.btn.sm{padding:6px 12px;font-size:13px} .btn.lg{padding:14px 24px;font-size:18px}
.btn.xl{padding:18px 28px;font-size:24px;width:100%} .btn.block{width:100%}

/* cartes / champs */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius)}
.card.pad{padding:20px}
label.field{display:block;margin-bottom:14px}
label.field>span{display:block;margin-bottom:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
.input,.select,textarea.input{width:100%;background:var(--bg);border:1px solid var(--card-border);border-radius:10px;padding:11px 13px;color:var(--text);font-family:var(--fb);font-size:15px;transition:border-color .15s,box-shadow .15s}
.input:focus,.select:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 1px var(--violet)}
.input::placeholder{color:var(--text-muted)} .select{cursor:pointer}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:7px;padding:2px 9px;font-size:12px;font-weight:700;font-family:var(--fm);border:1px solid}
.badge.violet{color:var(--violet-light);border-color:rgba(124,58,237,.4);background:rgba(124,58,237,.12)}
.badge.ok{color:var(--ok);border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1)}
.badge.low{color:var(--low);border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1)}
.badge.out{color:var(--out);border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1)}

/* tables */
table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);font-weight:700;padding:12px 16px;border-bottom:1px solid var(--card-border)}
tbody td{padding:12px 16px;border-bottom:1px solid rgba(36,26,56,.5);font-size:15px}
tbody tr:last-child td{border-bottom:none}

/* toaster */
#toaster{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);z-index:3000;display:flex;flex-direction:column;gap:10px;width:calc(100% - 32px);max-width:380px}
.toast{display:flex;align-items:center;gap:10px;padding:13px 16px;border-radius:12px;border:1px solid;backdrop-filter:blur(8px);animation:pop .18s ease-out;font-weight:600;font-size:14px}
.toast.success{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.15);color:var(--ok)}
.toast.error{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.15);color:var(--out)}

/* modal */
.modal-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.7);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{width:100%;max-width:520px;max-height:88vh;overflow-y:auto;background:var(--card);border:1px solid rgba(124,58,237,.4);border-radius:18px;box-shadow:var(--glow-lg);animation:pop .18s ease-out}
.modal.lg{max-width:760px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--card-border);position:sticky;top:0;background:var(--card);z-index:1}
.modal-head h2{font-size:26px;color:var(--violet-light)}
.modal-body{padding:22px}
.x-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:26px;line-height:1}
.x-btn:hover{color:var(--violet-light)}

@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--violet);border-radius:5px}

/* ---- écrans ---- */
.screen{display:none} .screen.active{display:block}
.center-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.spinner{width:40px;height:40px;border:3px solid var(--card-border);border-top-color:var(--violet);border-radius:50%;animation:spin .8s linear infinite}
.demo-note{background:linear-gradient(90deg,var(--violet-deep),var(--violet));color:#fff;text-align:center;padding:8px 12px;font-size:13px;font-weight:600}

/* login */
.login-inner{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;min-height:100vh}
.login-card{width:100%;max-width:380px}

/* menu public */
.hero{position:relative;text-align:center;padding:48px 20px;border-bottom:1px solid var(--card-border);background:radial-gradient(circle at 50% 0%,rgba(124,58,237,.18) 0%,transparent 55%),linear-gradient(160deg,#140b22 0%,#0a0710 55%,#1a0e2e 100%)}
.hero h1{font-size:60px;color:var(--violet-light)}
.menu-section{margin-bottom:44px}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(min-width:640px){.menu-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.menu-grid{grid-template-columns:repeat(4,1fr)}}
.thumb{border:1px solid var(--card-border);border-radius:var(--radius);background:var(--card);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.thumb:hover{border-color:var(--violet-light);box-shadow:var(--shadow)}
.thumb .img{aspect-ratio:1;background:var(--bg);display:grid;place-items:center;font-size:52px;opacity:.35;background-size:cover;background-position:center}
.thumb .info{padding:12px}

/* caisse */
.caisse-layout{display:flex;height:100vh;flex-direction:column}
.caisse-main{display:flex;flex:1;overflow:hidden}
.caisse-products{flex:1;display:flex;flex-direction:column;overflow:hidden}
.rush-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--card-border);background:rgba(10,7,16,.95);backdrop-filter:blur(8px)}
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 16px 10px;border-bottom:1px solid var(--card-border)}
.cat-tab{flex-shrink:0;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--card-border);background:var(--card);color:var(--text-muted);border-radius:10px;padding:9px 16px;font-weight:700;text-transform:uppercase;font-size:13px;letter-spacing:.5px;cursor:pointer;transition:all .12s;white-space:nowrap}
.cat-tab:hover{border-color:var(--violet);color:var(--violet-light)}
.cat-tab.active{background:var(--violet);color:#fff;border-color:var(--violet);box-shadow:var(--glow)}
.products-scroll{flex:1;overflow-y:auto;padding:16px;padding-bottom:100px}
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:640px){.products-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.products-grid{grid-template-columns:repeat(4,1fr)}.products-scroll{padding-bottom:16px}}
@media(min-width:1280px){.products-grid{grid-template-columns:repeat(5,1fr)}}
.pcard{display:flex;flex-direction:column;text-align:left;overflow:hidden;border:1px solid var(--card-border);border-radius:var(--radius);background:var(--card);cursor:pointer;transition:all .12s;position:relative}
.pcard:hover{border-color:var(--violet-light);box-shadow:var(--shadow)}
.pcard:active{transform:scale(.96)}
.pcard.out{opacity:.5;cursor:not-allowed}
.pcard .img{aspect-ratio:1;background:var(--bg);display:grid;place-items:center;font-size:56px;opacity:.25;position:relative;background-size:cover;background-position:center}
.pcard .dot{position:absolute;top:8px;right:8px;width:12px;height:12px;border-radius:50%}
.pcard .body{padding:12px;display:flex;flex-direction:column;flex:1}
.pcard .name{font-family:var(--fd);font-size:19px;letter-spacing:.5px;line-height:1.05}
.pcard .price{margin-top:auto;padding-top:8px;font-family:var(--fm);font-weight:700;font-size:18px;color:var(--violet-light)}
.out-tag{position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.5)}
.out-tag span{background:var(--out);color:#fff;font-size:12px;font-weight:700;text-transform:uppercase;padding:4px 10px;border-radius:7px}
.cart{width:340px;border-left:1px solid var(--card-border);display:flex;flex-direction:column;background:var(--card);height:100%}
.cart-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--card-border)}
.cart-lines{flex:1;overflow-y:auto;padding:10px 12px}
.cart-line{border:1px solid var(--card-border);border-radius:10px;padding:10px;background:var(--bg);margin-bottom:8px}
.qty-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--card-border);background:var(--card);color:var(--text);cursor:pointer;font-size:18px;display:grid;place-items:center;transition:all .1s}
.qty-btn:hover{border-color:var(--violet)} .qty-btn:active{transform:scale(.9)} .qty-btn:disabled{opacity:.3}
.cart-foot{border-top:1px solid var(--card-border);padding:16px}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);text-align:center;padding:40px 20px}
.cart-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;background:var(--violet);color:#fff;padding:14px 20px;box-shadow:var(--glow-lg);cursor:pointer;border:none;font-family:var(--fb)}
.cart-drawer{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column}
.cart-drawer .scrim{flex:1;background:rgba(0,0,0,.6)}
.cart-drawer .panel{max-height:86vh;background:var(--card);border-top:1px solid rgba(124,58,237,.4);border-radius:18px 18px 0 0;display:flex;flex-direction:column}
@media(min-width:1024px){.cart-bar,.cart-drawer{display:none!important}}
@media(max-width:1023px){.cart.desktop{display:none}}

/* admin */
.admin-layout{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;border-right:1px solid var(--card-border);background:var(--bg);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-head{padding:18px 16px;border-bottom:1px solid var(--card-border)}
.sidebar-nav{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:4px}
.nav-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;color:var(--text-muted);font-weight:600;font-size:15px;cursor:pointer;transition:all .12s;border:none;background:none;font-family:var(--fb);text-align:left;width:100%}
.nav-link:hover{background:var(--card);color:var(--violet-light)}
.nav-link.active{background:var(--violet);color:#fff;box-shadow:var(--glow)}
.nav-link svg{width:18px;height:18px}
.sidebar-foot{border-top:1px solid var(--card-border);padding:12px}
.admin-content{flex:1;padding:26px 32px;overflow-x:hidden}
.page-head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--card-border);padding-bottom:16px;margin-bottom:24px}
.page-head h1{font-size:38px;color:var(--violet-light)}
.page-head .sub{margin-top:4px;font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(min-width:1024px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{padding:16px}
.kpi .label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)}
.kpi .value{margin-top:8px;font-family:var(--fm);font-size:26px;font-weight:700}
.mobile-bar{display:none}
@media(max-width:1023px){
  .sidebar{display:none}
  .sidebar.open{display:flex;position:fixed;z-index:70;left:0;top:0;bottom:0;animation:slideIn .2s ease}
  .mobile-bar{display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;padding:12px 16px;border-bottom:1px solid var(--card-border);background:rgba(10,7,16,.95);backdrop-filter:blur(8px)}
  .admin-content{padding:18px 16px}
  .scrim-admin{position:fixed;inset:0;z-index:65;background:rgba(0,0,0,.6)}
}
@keyframes slideIn{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.two-col{display:grid;gap:24px}
@media(min-width:1024px){.two-col{grid-template-columns:1fr 1fr}}
.form-grid{display:grid;gap:14px;grid-template-columns:1fr 1fr}
.form-grid .full{grid-column:1/-1}
@media(max-width:520px){.form-grid{grid-template-columns:1fr}}
.variant-box{border:1px solid var(--card-border);border-radius:12px;background:var(--bg);padding:16px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-row .lbl{width:140px;font-size:13px;flex-shrink:0}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:6px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--violet-deep),var(--violet),var(--violet-light));border-radius:6px;min-width:2px;transition:width .4s}
.bar-row .val{width:64px;text-align:right;font-family:var(--fm);font-size:13px;color:var(--violet-light)}
</style>
</head>

function _pv(p,db,incP=true){const vs=db.product_variants.filter(v=>v.product_id===p.id).sort((a,b)=>a.display_order-b.display_order).map(v=>incP?v:{...v,purchase_price:0});return {...p,category:db.categories.find(c=>c.id===p.category_id)||null,variants:vs}}

const Auth={
  async signIn(email,password){
    if(DEMO_MODE){const a=DEMO_ACCOUNTS.find(x=>x.email===email.trim().toLowerCase()&&x.password===password);if(!a)return{error:"Email ou mot de passe incorrect."};
      const s={id:a.role==="admin"?"demo-admin":"demo-barman",username:a.username,role:a.role,email:a.email};localStorage.setItem("dahu-session",JSON.stringify(s));return{profile:s}}
    const {data,error}=await sb().auth.signInWithPassword({email:email.trim(),password});if(error||!data.user)return{error:"Email ou mot de passe incorrect."};
    const {data:pr}=await sb().from("profiles").select("*").eq("id",data.user.id).single();return{profile:pr}},
  async current(){if(DEMO_MODE){try{return JSON.parse(localStorage.getItem("dahu-session"))}catch(e){return null}}
    const {data:{user}}=await sb().auth.getUser();if(!user)return null;const {data:pr}=await sb().from("profiles").select("*").eq("id",user.id).single();return pr},
  async signOut(){if(DEMO_MODE){localStorage.removeItem("dahu-session");return}await sb().auth.signOut()},

    const iso=window.supabase.createClient(DAHU_CONFIG.SUPABASE_URL,DAHU_CONFIG.SUPABASE_ANON_KEY,{auth:{persistSession:false,autoRefreshToken:false}});
    const {error}=await iso.auth.signUp({email:email.trim(),password,options:{data:{username,role}}});if(error)return{error:error.message};return{ok:true}}
};

const Products={
  async _all(incPurchase){if(DEMO_MODE){const db=DemoDB.load();return db.products.slice().sort((a,b)=>a.display_order-b.display_order).map(p=>_pv(p,db,incPurchase))}
    const sel=incPurchase?"*,category:categories(*),variants:product_variants(*)":"id,name,category_id,description,active,visible,display_order,created_at,category:categories(*),variants:product_variants(id,product_id,label,code,photo_url,sale_price,stock,min_stock,unit,volume_cl,display_order,is_default)";
    const {data,error}=await sb().from("products").select(sel).order("display_order");if(error)throw error;
    return (data||[]).map(p=>({...p,variants:(p.variants||[]).map(v=>incPurchase?v:{...v,purchase_price:0}).sort((a,b)=>a.display_order-b.display_order)}))},
  async listActive(){const all=await this._all(false);return all.filter(p=>p.active)},
  async listPublic(){const all=await this._all(false);return all.filter(p=>p.active&&p.visible)},
  async listAll(){return this._all(true)},
  async listCategories(){if(DEMO_MODE)return DemoDB.load().categories.slice().sort((a,b)=>a.display_order-b.display_order);const {data}=await sb().from("categories").select("*").order("display_order");return data||[]},
  async save(product,variants){
    if(DEMO_MODE){const db=DemoDB.load();
      if(product.id){const i=db.products.findIndex(p=>p.id===product.id);db.products[i]={...db.products[i],...product}}
      else{product.id=uid();product.created_at=new Date().toISOString();product.display_order=db.products.length+1;db.products.push(product)}
      const kept=variants.filter(v=>v.id).map(v=>v.id);db.product_variants=db.product_variants.filter(v=>v.product_id!==product.id||kept.includes(v.id));
      variants.forEach((v,i)=>{v.product_id=product.id;v.display_order=i;v.is_default=variants.length===1;
        if(v.id){const idx=db.product_variants.findIndex(x=>x.id===v.id);if(idx>=0)db.product_variants[idx]={...db.product_variants[idx],...v};else db.product_variants.push(v)}
        else{v.id=uid();db.product_variants.push(v)}});
      DemoDB.save();return{ok:true}}
    const supa=sb();let pid=product.id;
    if(pid){const {error}=await supa.from("products").update(product).eq("id",pid);if(error)throw error}
    else{const {data,error}=await supa.from("products").insert(product).select("id").single();if(error)throw error;pid=data.id}
    const single=variants.length===1;
    for(let i=0;i<variants.length;i++){const v={...variants[i],product_id:pid,display_order:i,is_default:single};
      if(v.id){const {error}=await supa.from("product_variants").update(v).eq("id",v.id);if(error)throw error}
      else{const {error}=await supa.from("product_variants").insert(v);if(error)throw error}}
    return{ok:true}},
  async toggleActive(id,active){if(DEMO_MODE){const db=DemoDB.load();const p=db.products.find(x=>x.id===id);if(p)p.active=active;DemoDB.save();return}await sb().from("products").update({active}).eq("id",id)}
};

const Sales={
  async create(lines){
    if(DEMO_MODE){const db=DemoDB.load();let total=0,count=0;
      for(const l of lines){const v=db.product_variants.find(x=>x.id===l.variantId);if(!v||v.stock<l.qty)throw new Error("Stock insuffisant pour "+l.productName)}
      const sid=uid();const now=new Date().toISOString();
      for(const l of lines){const v=db.product_variants.find(x=>x.id===l.variantId);const line=v.sale_price*l.qty;total+=line;count+=l.qty;v.stock-=l.qty;
        db.sale_items.push({id:uid(),sale_id:sid,variant_id:v.id,product_name:l.productName,qty:l.qty,unit_price:v.sale_price,line_total:line,created_at:now});
        db.stock_movements.unshift({id:uid(),variant_id:v.id,type:"sale",qty_delta:-l.qty,stock_after:v.stock,reason:"Vente caisse",created_at:now})}
      total=Math.round(total*100)/100;db.sales.unshift({id:sid,total,item_count:count,created_at:now});DemoDB.save();return{sale_id:sid,total,item_count:count}}
    const items=lines.map(l=>({variant_id:l.variantId,qty:l.qty}));const {data,error}=await sb().rpc("create_sale",{items});if(error)throw new Error(error.message);return Array.isArray(data)?data[0]:data},
  async recent(limit=8){if(DEMO_MODE)return DemoDB.load().sales.slice(0,limit);const {data}=await sb().from("sales").select("*").order("created_at",{ascending:false}).limit(limit);return data||[]},
  async list(from,to){if(DEMO_MODE){const db=DemoDB.load();let r=db.sales.slice().sort((a,b)=>b.created_at.localeCompare(a.created_at));if(from)r=r.filter(s=>s.created_at>=from);if(to)r=r.filter(s=>s.created_at<=to+"T23:59:59");return r.map(s=>({...s,items:db.sale_items.filter(it=>it.sale_id===s.id)}))}
    let q=sb().from("sales").select("*,items:sale_items(*)").order("created_at",{ascending:false}).limit(200);if(from)q=q.gte("created_at",new Date(from).toISOString());if(to){const e=new Date(to);e.setHours(23,59,59,999);q=q.lte("created_at",e.toISOString())}const {data}=await q;return data||[]},
  async allItems(){if(DEMO_MODE)return DemoDB.load().sale_items.slice();const {data}=await sb().from("sale_items").select("*");return data||[]}
};

const Stock={
  async adjust({variantId,value,mode,type,reason}){
    if(DEMO_MODE){const db=DemoDB.load();const v=db.product_variants.find(x=>x.id===variantId);if(!v)throw new Error("Produit introuvable");
      const ns=mode==="add"?v.stock+value:value;if(ns<0)throw new Error("Le stock ne peut pas être négatif");const delta=ns-v.stock;v.stock=ns;
      db.stock_movements.unshift({id:uid(),variant_id:v.id,type,qty_delta:delta,stock_after:ns,reason:reason||null,created_at:new Date().toISOString()});DemoDB.save();return ns}
    const {data,error}=await sb().rpc("adjust_stock",{p_variant_id:variantId,p_value:value,p_mode:mode,p_type:type,p_reason:reason||null});if(error)throw new Error(error.message);return data},
  async movements(){if(DEMO_MODE){const db=DemoDB.load();return db.stock_movements.map(m=>{const v=db.product_variants.find(x=>x.id===m.variant_id);const p=v?db.products.find(x=>x.id===v.product_id):null;return{...m,variant:v?{label:v.label,product:p?{name:p.name}:null}:null}})}
    const {data}=await sb().from("stock_movements").select("*,variant:product_variants(label,product:products(name))").order("created_at",{ascending:false}).limit(200);return data||[]},
  async recordPurchase({supplierId,variantId,qty,unitPrice,supplierRef,date}){
    if(DEMO_MODE){const db=DemoDB.load();db.purchases.unshift({id:uid(),supplier_id:supplierId,variant_id:variantId,qty,unit_purchase_price:unitPrice,total_cost:Math.round(qty*unitPrice*100)/100,supplier_ref:supplierRef||null,purchase_date:date,created_at:new Date().toISOString()});
      await this.adjust({variantId,value:qty,mode:"add",type:"restock",reason:"Achat fournisseur"});DemoDB.save();return{ok:true}}
    const {error}=await sb().rpc("record_purchase",{p_supplier_id:supplierId,p_variant_id:variantId,p_qty:qty,p_unit_price:unitPrice,p_supplier_ref:supplierRef||null,p_date:date});if(error)throw new Error(error.message);return{ok:true}},
  async purchases(limit=12){if(DEMO_MODE){const db=DemoDB.load();return db.purchases.slice(0,limit).map(p=>({...p,supplier:db.suppliers.find(s=>s.id===p.supplier_id)||null}))}
    const {data}=await sb().from("purchases").select("*,supplier:suppliers(*)").order("purchase_date",{ascending:false}).limit(limit);return data||[]}
};

const Suppliers={
  async list(){if(DEMO_MODE)return DemoDB.load().suppliers.slice().sort((a,b)=>a.name.localeCompare(b.name));const {data}=await sb().from("suppliers").select("*").order("name");return data||[]},
  async save(s){if(DEMO_MODE){const db=DemoDB.load();if(s.id){const i=db.suppliers.findIndex(x=>x.id===s.id);db.suppliers[i]={...db.suppliers[i],...s}}else{s.id=uid();s.created_at=new Date().toISOString();db.suppliers.push(s)}DemoDB.save();return{ok:true}}
    const {error}=s.id?await sb().from("suppliers").update(s).eq("id",s.id):await sb().from("suppliers").insert(s);if(error)throw error;return{ok:true}},
  async remove(id){if(DEMO_MODE){const db=DemoDB.load();db.suppliers=db.suppliers.filter(s=>s.id!==id);DemoDB.save();return}await sb().from("suppliers").delete().eq("id",id)}
};

  async setActive(id,active){if(DEMO_MODE){const db=DemoDB.load();const u=db.profiles.find(x=>x.id===id);if(u)u.active=active;DemoDB.save();return}await sb().from("profiles").update({active}).eq("id",id)}
};

const Stats={
  async dashboard(){const sales=DEMO_MODE?DemoDB.load().sales:((await sb().from("sales").select("total,created_at")).data||[]);
    const st=new Date();st.setHours(0,0,0,0);const today=sales.filter(s=>new Date(s.created_at)>=st);
    return{todayRevenue:today.reduce((a,s)=>a+Number(s.total),0),todayCount:today.length,totalRevenue:sales.reduce((a,s)=>a+Number(s.total),0),totalSales:sales.length}},
  async topProducts(limit=8){const items=await Sales.allItems();const m=new Map();for(const it of items){const p=m.get(it.product_name)||{product_name:it.product_name,qty:0,revenue:0};p.qty+=it.qty;p.revenue+=Number(it.line_total);m.set(it.product_name,p)}return[...m.values()].sort((a,b)=>b.qty-a.qty).slice(0,limit)},
  async dailyRevenue(days=14){const sales=DEMO_MODE?DemoDB.load().sales:((await sb().from("sales").select("total,created_at")).data||[]);
    const since=new Date();since.setDate(since.getDate()-days);const m=new Map();
    for(const s of sales){const d=new Date(s.created_at);if(d<since)continue;const k=`${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;m.set(k,(m.get(k)||0)+Number(s.total))}
    return[...m.entries()].map(([day,revenue])=>({day,revenue}))}
};
</script>
<script>
/* ============================================================
   APPLICATION — routeur par écran (single page)
   ============================================================ */
const App={ profile:null, root:document.getElementById("app") };

async function boot(){
  App.profile=await Auth.current();
  route();
}
function go(hash){ if(location.hash===hash) route(); else location.hash=hash; }
window.addEventListener("hashchange",route);

async function route(){
  const h=(location.hash||"#menu").slice(1);
  const [screen]=h.split("/");
  // écrans protégés
  if(screen==="caisse"&&!App.profile){location.hash="#login";return}
  if(screen==="admin"){ if(!App.profile){location.hash="#login";return} if(App.profile.role!=="admin"){location.hash="#caisse";return} }
  try{
    if(screen==="login") return renderLogin();
    if(screen==="caisse") return renderCaisse();
    if(screen==="admin") return renderAdmin();
    return renderMenu();
  }catch(e){ App.root.innerHTML=`<div class="center-screen"><p style="color:var(--out)">Erreur : ${esc(e.message)}</p><button class="btn" onclick="location.hash='#menu'">Retour</button></div>`; }
}

async function doSignOut(){ await Auth.signOut(); App.profile=null; location.hash="#login"; }

/* ---------------- LOGIN ---------------- */
function renderLogin(){
  App.root.innerHTML=`
  <div class="banner"></div>${demoNote()}
  <div class="login-inner">
    <div style="margin-bottom:14px"><div class="logo-mark lg">D</div></div>
    <h1 class="fd violet-text" style="font-size:40px;letter-spacing:5px">DAHU CAISSE</h1>
    <p class="fm" style="margin:8px 0 28px;letter-spacing:3px;text-transform:uppercase;font-size:12px;color:var(--text-muted)">One Love · One Sound · One Vibe</p>
    <div class="card pad login-card">
      <label class="field"><span>Email</span><input class="input" id="lg-email" type="email" placeholder="prenom@dahu.fr" value="${DEMO_MODE?"admin@dahu.fr":""}"></label>
      <label class="field"><span>Mot de passe</span><input class="input" id="lg-pass" type="password" placeholder="••••••••" value="${DEMO_MODE?"admin":""}"></label>
      <button class="btn lg block" id="lg-btn">Se connecter</button>
      <p id="lg-err" class="hidden" style="margin-top:14px;padding:9px 12px;border-radius:10px;border:1px solid rgba(239,68,68,.4);background:rgba(239,68,68,.1);color:var(--out);font-size:14px;text-align:center"></p>
      <p class="muted center" style="margin-top:18px;font-size:12px">Barmen & admins se connectent ici.</p>
    </div>
    <a href="#menu" class="muted" style="margin-top:22px;font-size:14px">← Voir le menu public</a>
  </div>`;
  const email=document.getElementById("lg-email"),pass=document.getElementById("lg-pass"),err=document.getElementById("lg-err"),btn=document.getElementById("lg-btn");
  async function login(){
    err.classList.add("hidden");btn.disabled=true;btn.textContent="Connexion…";
    const {profile,error}=await Auth.signIn(email.value,pass.value);
    if(error||!profile){err.textContent=error||"Connexion impossible.";err.classList.remove("hidden");btn.disabled=false;btn.textContent="Se connecter";return}
    App.profile=profile;location.hash=profile.role==="admin"?"#admin":"#caisse";
  }
  btn.onclick=login;
  [email,pass].forEach(el=>el.addEventListener("keydown",e=>{if(e.key==="Enter")login()}));
}

/* ---------------- MENU PUBLIC ---------------- */
async function renderMenu(){
  App.root.innerHTML=`<div class="banner"></div>${demoNote()}
    <header class="hero">
      <div style="display:flex;justify-content:center;margin-bottom:14px"><div class="logo-mark lg">D</div></div>
      <h1 class="fd">LA CARTE</h1>
      <p class="fm" style="margin-top:8px;letter-spacing:3px;text-transform:uppercase;font-size:12px;color:var(--text-muted)">Dahu Sound System · Bar associatif</p>
      <a href="#login" class="btn" style="position:absolute;right:16px;top:16px">${icon("login",16)}<span>Connexion</span></a>
    </header>
    <main style="max-width:1100px;margin:0 auto;padding:40px 16px" id="menu-root"><p class="center muted">Chargement…</p></main>
    <footer style="border-top:1px solid var(--card-border);padding:32px 16px;text-align:center">
      <div class="divider" style="max-width:280px;margin:0 auto 16px"></div>
      <div class="fd violet-text" style="font-size:22px;letter-spacing:3px">Dahu Sound System</div>
      <p class="muted" style="font-size:12px;margin-top:4px">Association loi 1901 · One Love, One Sound</p>
    </footer>`;
  const root=document.getElementById("menu-root");
  const products=await Products.listPublic();
  if(!products.length){root.innerHTML=`<div class="card pad center"><p class="muted">La carte n'est pas encore disponible.</p></div>`;return}
  const groups=new Map();
  for(const p of products){const key=p.category?.slug||"autres";const g=groups.get(key)||{name:p.category?.name||"Autres",icon:p.category?.icon||"✨",items:[]};g.items.push(p);groups.set(key,g)}
  let html="";
  for(const g of groups.values()){
    html+=`<section class="menu-section"><div class="row gap-2" style="margin-bottom:2px"><span style="font-size:24px">${g.icon}</span><h2 class="fd violet-text" style="font-size:30px">${esc(g.name)}</h2></div><div class="divider"></div><div class="menu-grid">`;
    for(const p of g.items)for(const v of p.variants){
      const st=stockStatus(v.stock,v.min_stock);const label=st==="out"?"Épuisé":st==="low"?"Stock bas":"Dispo";
      html+=`<div class="thumb"><div class="img">${g.icon}</div><div class="info"><div class="fd" style="font-size:18px">${esc(p.name)}</div>${p.variants.length>1?`<div class="muted" style="font-size:12px">${esc(v.label)}</div>`:""}<div class="row between" style="margin-top:8px"><span class="fm violet-text" style="font-size:17px;font-weight:700">${euro(v.sale_price)}</span><span class="badge ${st}">${label}</span></div></div></div>`;
    }
    html+=`</div></section>`;
  }
  root.innerHTML=html;
}
</script>
<script>
/* ---------------- CAISSE (POS) ---------------- */
let CAISSE={products:[],activeCat:"all",cart:[],submitting:false,drawerOpen:false};

async function renderCaisse(){
  CAISSE.products=await Products.listActive();
  paintCaisse();
}
function caisseCats(){const m=new Map();for(const p of CAISSE.products)if(p.category)m.set(p.category.slug,{slug:p.category.slug,name:p.category.name,icon:p.category.icon||"✨"});return[...m.values()]}
function caisseFiltered(){return CAISSE.activeCat==="all"?CAISSE.products:CAISSE.products.filter(p=>p.category?.slug===CAISSE.activeCat)}
function cartTotal(){return CAISSE.cart.reduce((s,l)=>s+l.salePrice*l.qty,0)}
function cartCount(){return CAISSE.cart.reduce((s,l)=>s+l.qty,0)}
function addVariant(v,name){const l=CAISSE.cart.find(x=>x.variantId===v.id);if(l){if(l.qty<v.stock)l.qty++}else{if(v.stock<=0)return;CAISSE.cart.push({variantId:v.id,productName:name+" — "+v.label,salePrice:v.sale_price,qty:1,stock:v.stock})}paintCaisse()}
function setQty(id,qty){const l=CAISSE.cart.find(x=>x.variantId===id);if(!l)return;if(qty<=0)CAISSE.cart=CAISSE.cart.filter(x=>x.variantId!==id);else l.qty=Math.min(qty,l.stock);paintCaisse()}
function tapProduct(p){if(p.variants.length===1)addVariant(p.variants[0],p.name);else openVariantPicker(p)}
function openVariantPicker(p){
  const box=document.createElement("div");
  box.innerHTML=`<p class="muted" style="margin-bottom:12px">Choisis le format :</p>`+p.variants.map(v=>{const out=v.stock<=0;const st=stockStatus(v.stock,v.min_stock);
    return `<button class="card" ${out?"disabled":""} data-vid="${v.id}" style="display:flex;width:100%;align-items:center;justify-content:space-between;padding:16px;margin-bottom:10px;cursor:${out?"not-allowed":"pointer"};opacity:${out?.4:1};text-align:left;border-color:var(--card-border)"><div><div class="fd" style="font-size:20px">${esc(v.label)}</div><div style="font-size:12px">${out?'<span style="color:var(--out)">Épuisé</span>':`<span style="color:${st==="low"?"var(--low)":"var(--ok)"}">${v.stock} en stock</span>`}</div></div><span class="fm violet-text" style="font-size:20px;font-weight:700">${euro(v.sale_price)}</span></button>`}).join("");
  box.querySelectorAll("button[data-vid]").forEach(b=>{if(b.disabled)return;b.onclick=()=>{addVariant(p.variants.find(x=>x.id===b.dataset.vid),p.name);closeModal()}});
  openModal({title:p.name,body:box});
}
async function validateSale(){
  if(!CAISSE.cart.length||CAISSE.submitting)return;
  CAISSE.submitting=true;paintCaisse();
  try{const res=await Sales.create(CAISSE.cart);toast(`Vente enregistrée · ${euro(res.total)} · ${res.item_count} article(s)`);CAISSE.cart=[];CAISSE.drawerOpen=false;CAISSE.products=await Products.listActive()}
  catch(e){toast(e.message,"error")}
  finally{CAISSE.submitting=false;paintCaisse()}
}
function cartHTML(){
  if(!CAISSE.cart.length)return `<div class="cart-empty">${icon("cart",40)}<p style="margin-top:10px">Tape un produit pour l'ajouter</p></div>`;
  const lines=CAISSE.cart.map(l=>`<div class="cart-line"><div class="row between gap-2" style="align-items:flex-start"><div style="min-width:0;flex:1"><div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.productName)}</div><div class="fm muted" style="font-size:12px">${euro(l.salePrice)} × ${l.qty} = <span class="violet-text">${euro(l.salePrice*l.qty)}</span></div></div><button class="qty-btn" style="width:30px;height:30px;border:none;background:none;color:var(--text-muted)" data-rm="${l.variantId}">${icon("trash",15)}</button></div><div class="row gap-2" style="margin-top:8px"><button class="qty-btn" data-dec="${l.variantId}">${icon("minus",16)}</button><span class="fm" style="width:32px;text-align:center;font-size:18px;font-weight:700">${l.qty}</span><button class="qty-btn" data-inc="${l.variantId}" ${l.qty>=l.stock?"disabled":""}>${icon("plus",16)}</button>${l.qty>=l.stock?'<span class="muted" style="font-size:10px;text-transform:uppercase;color:var(--low)">max</span>':""}</div></div>`).join("");
  const prep=CAISSE.cart.map(l=>`<div class="row between"><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.productName)}</span><span class="violet-text" style="margin-left:8px;flex-shrink:0">×${l.qty}</span></div>`).join("");
  return `<div class="cart-head"><div class="row gap-2">${icon("cart",20)}<span class="fd" style="font-size:20px">Panier</span>${cartCount()?`<span class="pill" style="border-radius:999px;padding:2px 8px">${cartCount()}</span>`:""}</div><button class="btn ghost sm" data-clear>Vider</button></div><div class="cart-lines">${lines}</div><div class="cart-foot"><div style="background:var(--bg);border-radius:10px;padding:12px;margin-bottom:12px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:4px">À préparer</div><div class="fm" style="font-size:14px;display:flex;flex-direction:column;gap:2px">${prep}</div></div><div class="row between" style="align-items:flex-end;margin-bottom:12px"><span class="muted" style="text-transform:uppercase;font-size:14px">Total</span><span class="fm violet-text" style="font-size:30px;font-weight:700">${euro(cartTotal())}</span></div><button class="btn xl" data-validate ${CAISSE.submitting?"disabled":""}>${CAISSE.submitting?"Enregistrement…":"✓ Valider"}</button><p class="center muted" style="margin-top:8px;font-size:11px">Paiement à encaisser sur le TPE</p></div>`;
}
function bindCart(scope){
  scope.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>{const l=CAISSE.cart.find(x=>x.variantId===b.dataset.inc);setQty(b.dataset.inc,l.qty+1)});
  scope.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>{const l=CAISSE.cart.find(x=>x.variantId===b.dataset.dec);setQty(b.dataset.dec,l.qty-1)});
  scope.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>setQty(b.dataset.rm,0));
  const c=scope.querySelector("[data-clear]");if(c)c.onclick=()=>{CAISSE.cart=[];paintCaisse()};
  const v=scope.querySelector("[data-validate]");if(v)v.onclick=validateSale;
}
function paintCaisse(){
  const catTabs=`<div class="cat-tabs"><button class="cat-tab ${CAISSE.activeCat==="all"?"active":""}" data-cat="all">🔊 Tout</button>${caisseCats().map(c=>`<button class="cat-tab ${CAISSE.activeCat===c.slug?"active":""}" data-cat="${c.slug}"><span>${c.icon}</span>${esc(c.name)}</button>`).join("")}</div>`;
  const grid=caisseFiltered().length?`<div class="products-grid">${caisseFiltered().map(p=>{
    const totalStock=p.variants.reduce((s,v)=>s+v.stock,0);const out=totalStock<=0;const minPrice=Math.min(...p.variants.map(v=>v.sale_price));const multi=p.variants.length>1;
    const anyOk=p.variants.some(v=>stockStatus(v.stock,v.min_stock)==="ok");const st=out?"out":anyOk?"ok":"low";const dot=st==="ok"?"var(--ok)":st==="low"?"var(--low)":"var(--out)";
    return `<button class="pcard ${out?"out":""}" data-pid="${p.id}" ${out?"disabled":""}><div class="img">${p.category?.icon||"✨"}<span class="dot" style="background:${dot}"></span>${out?'<span class="out-tag"><span>Épuisé</span></span>':""}</div><div class="body"><div class="name">${esc(p.name)}</div><div class="price">${multi?'<span class="muted" style="font-size:12px;font-weight:400">dès </span>':""}${euro(minPrice)}</div></div></button>`;
  }).join("")}</div>`:`<p class="center muted" style="padding:40px">Aucun produit dans cette catégorie.</p>`;
  App.root.innerHTML=`<div class="caisse-layout"><div class="rush-header"><div class="banner"></div>${demoNote()}<div class="rush-bar">${logoHTML()}<div class="row gap-3">${App.profile?.role==="admin"?`<a href="#admin" class="btn secondary sm">Admin</a>`:""}<span class="muted" style="font-size:14px">${esc(App.profile?.username||"")} <span class="pill">${esc(App.profile?.role||"")}</span></span><button class="btn ghost sm" onclick="doSignOut()">${icon("logout",16)}<span>Sortir</span></button></div></div></div>
    <div class="caisse-main"><div class="caisse-products">${catTabs}<div class="products-scroll">${grid}</div></div><aside class="cart desktop">${cartHTML()}</aside></div>
    ${cartCount()?`<button class="cart-bar"><span class="row gap-2" style="font-weight:700">${icon("cart",20)} ${cartCount()} article(s)</span><span class="fm" style="font-size:20px;font-weight:700">${euro(cartTotal())}</span></button>`:""}
    ${CAISSE.drawerOpen?`<div class="cart-drawer"><div class="scrim"></div><div class="panel">${cartHTML()}</div></div>`:""}</div>`;
  App.root.querySelectorAll("[data-cat]").forEach(b=>b.onclick=()=>{CAISSE.activeCat=b.dataset.cat;paintCaisse()});
  App.root.querySelectorAll("[data-pid]").forEach(b=>{if(!b.disabled)b.onclick=()=>tapProduct(CAISSE.products.find(p=>p.id===b.dataset.pid))});
  const bar=App.root.querySelector(".cart-bar");if(bar)bar.onclick=()=>{CAISSE.drawerOpen=true;paintCaisse()};
  const scrim=App.root.querySelector(".cart-drawer .scrim");if(scrim)scrim.onclick=()=>{CAISSE.drawerOpen=false;paintCaisse()};
  App.root.querySelectorAll(".cart").forEach(c=>bindCart(c));
  const panel=App.root.querySelector(".cart-drawer .panel");if(panel)bindCart(panel);
}
</script>
<script>
/* ---------------- ADMIN ---------------- */
const ADMIN_NAV=[
  {id:"dashboard",label:"Dashboard",icon:"dashboard"},{id:"produits",label:"Produits",icon:"package"},
  {id:"stock",label:"Stock",icon:"boxes"},{id:"previsions",label:"Prévisions",icon:"trending"},
  {id:"achats",label:"Achats",icon:"bag"},{id:"fournisseurs",label:"Fournisseurs",icon:"truck"},
  {id:"historique",label:"Historique",icon:"history"},{id:"stats",label:"Statistiques",icon:"chart"},
  {id:"exports",label:"Exports CSV",icon:"download"},{id:"utilisateurs",label:"Utilisateurs",icon:"users"},
];
let ADMIN={sidebarOpen:false};
function adminRoute(){const parts=(location.hash||"#admin/dashboard").slice(1).split("/");const sub=parts[1]||"dashboard";return ADMIN_NAV.find(n=>n.id===sub)?sub:"dashboard"}
function pageHead(title,sub,action=""){return `<div class="page-head"><div><h1>${esc(title)}</h1>${sub?`<div class="sub">${esc(sub)}</div>`:""}</div>${action}</div>`}
function toggleSidebar(){ADMIN.sidebarOpen=!ADMIN.sidebarOpen;paintAdminShell()}

function paintAdminShell(){
  const route=adminRoute();
  const nav=ADMIN_NAV.map(n=>`<a class="nav-link ${route===n.id?"active":""}" href="#admin/${n.id}">${icon(n.icon,18)}<span>${n.label}</span></a>`).join("");
  App.root.innerHTML=`${demoNote()}
    <div class="mobile-bar">${logoHTML()}<button class="btn ghost" onclick="toggleSidebar()">${icon("menu",26)}</button></div>
    <div class="admin-layout">
      ${ADMIN.sidebarOpen?'<div class="scrim-admin" onclick="toggleSidebar()"></div>':""}
      <aside class="sidebar ${ADMIN.sidebarOpen?"open":""}">
        <div class="sidebar-head">${logoHTML()}</div>
        <nav class="sidebar-nav">${nav}</nav>
        <div class="sidebar-foot">
          <a href="#caisse" class="nav-link" style="color:var(--violet-light)">${icon("cart",18)}<span>Ouvrir la caisse</span></a>
          <div class="row between" style="padding:8px 14px"><span class="muted" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(App.profile?.username||"")}</span><button class="btn ghost sm" onclick="doSignOut()" style="padding:4px 8px">${icon("logout",14)} Sortir</button></div>
        </div>
      </aside>
      <main class="admin-content" id="admin-content"><div class="center muted" style="padding:40px"><div class="spinner" style="margin:0 auto 14px"></div>Chargement…</div></main>
    </div>`;
  App.root.querySelectorAll(".nav-link[href^='#admin']").forEach(a=>a.addEventListener("click",()=>{ADMIN.sidebarOpen=false}));
}
async function renderAdmin(){
  paintAdminShell();
  const route=adminRoute();
  const map={dashboard:adminDashboard,produits:adminProducts,stock:adminStock,previsions:adminForecasts,achats:adminPurchases,fournisseurs:adminSuppliers,historique:adminHistory,stats:adminStats,exports:adminExports,utilisateurs:adminUsers};
  try{ await map[route](); }
  catch(e){ document.getElementById("admin-content").innerHTML=`<div class="card pad"><p style="color:var(--out)">Erreur : ${esc(e.message)}</p></div>`; }
}
function setAdminContent(html){document.getElementById("admin-content").innerHTML=html}

/* DASHBOARD */
async function adminDashboard(){
  const [stats,products,recent]=await Promise.all([Stats.dashboard(),Products.listAll(),Sales.recent(8)]);
  const lows=[];for(const p of products)for(const v of p.variants){const st=stockStatus(v.stock,v.min_stock);if(st!=="ok")lows.push({name:p.name,label:v.label,stock:v.stock,min:v.min_stock})}
  lows.sort((a,b)=>a.stock-b.stock);
  const kpi=(ic,label,value,alert)=>`<div class="card kpi"><div class="label"><span style="color:${alert?"var(--low)":"var(--violet-light)"}">${icon(ic,20)}</span>${label}</div><div class="value" style="color:${alert?"var(--low)":"var(--text)"}">${value}</div></div>`;
  const lowsHTML=lows.length?lows.slice(0,8).map(v=>`<li class="row between" style="background:var(--bg);border-radius:10px;padding:9px 12px;margin-bottom:8px;list-style:none"><span style="font-size:14px">${esc(v.name)} <span class="muted">— ${esc(v.label)}</span></span><span class="badge ${v.stock<=0?"out":"low"}">${v.stock} / ${v.min}</span></li>`).join(""):`<p class="center" style="color:var(--ok);padding:20px">✓ Tous les stocks sont au vert</p>`;
  const salesHTML=recent.length?recent.map(s=>`<li class="row between" style="background:var(--bg);border-radius:10px;padding:9px 12px;margin-bottom:8px;list-style:none"><span class="fm muted" style="font-size:12px">${fdatetime(s.created_at)}</span><span style="font-size:14px">${s.item_count} art.</span><span class="fm violet-text" style="font-weight:700">${euro(s.total)}</span></li>`).join(""):`<p class="center muted" style="padding:20px">Aucune vente</p>`;
  setAdminContent(pageHead("Dashboard","Vue d'ensemble de la soirée")+`<div class="grid" style="gap:24px"><div class="kpi-grid">${kpi("euro","CA du jour",euro(stats.todayRevenue))}${kpi("cart","Ventes du jour",stats.todayCount)}${kpi("trending","CA total",euro(stats.totalRevenue))}${kpi("alert","Alertes stock",lows.length,lows.length>0)}</div><div class="two-col"><div class="card pad"><div class="row between" style="margin-bottom:16px"><h2 class="violet-text" style="font-size:24px">Alertes stock</h2><a href="#admin/stock" class="muted" style="font-size:14px">Gérer →</a></div><ul style="padding:0;margin:0">${lowsHTML}</ul></div><div class="card pad"><div class="row between" style="margin-bottom:16px"><h2 class="violet-text" style="font-size:24px">Dernières ventes</h2><a href="#admin/historique" class="muted" style="font-size:14px">Tout voir →</a></div><ul style="padding:0;margin:0">${salesHTML}</ul></div></div></div>`);
}

/* PRODUITS */
let _prodCache=[],_catCache=[];
async function adminProducts(){
  [_prodCache,_catCache]=await Promise.all([Products.listAll(),Products.listCategories()]);
  const list=_prodCache.length?_prodCache.map(p=>{
    const variants=p.variants.map(v=>{const st=stockStatus(v.stock,v.min_stock);return `<div class="row between" style="background:var(--bg);border-radius:10px;padding:8px 12px"><div style="min-width:0"><div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(v.label)}</div><div class="fm muted" style="font-size:12px">${euro(v.sale_price)} · achat ${euro(v.purchase_price)}</div></div><span class="badge ${st}">${v.stock}</span></div>`}).join("");
    return `<div class="card pad" style="margin-bottom:12px"><div class="row between wrap gap-3"><div style="min-width:0;flex:1"><div class="row gap-2"><span style="font-size:18px">${p.category?.icon||"✨"}</span><span class="fd" style="font-size:24px">${esc(p.name)}</span>${!p.active?'<span class="badge out">Inactif</span>':""}${!p.visible?'<span class="badge violet">Masqué menu</span>':""}</div><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-top:12px">${variants}</div></div><div class="row gap-2"><button class="btn secondary sm" data-edit="${p.id}">${icon("edit",15)} Éditer</button><button class="btn ghost sm" data-toggle="${p.id}">${p.active?"Désactiver":"Activer"}</button></div></div></div>`;
  }).join(""):`<div class="card pad center"><p class="muted">Aucun produit. Crée le premier.</p></div>`;
  setAdminContent(pageHead("Produits","Catalogue & variantes",`<button class="btn" data-new-product>${icon("plus",18)} Nouveau produit</button>`)+list);
  document.querySelector("[data-new-product]").onclick=()=>openProductForm(null);
  document.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>openProductForm(_prodCache.find(p=>p.id===b.dataset.edit)));
  document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=async()=>{const p=_prodCache.find(x=>x.id===b.dataset.toggle);await Products.toggleActive(p.id,!p.active);toast(p.active?"Produit désactivé":"Produit réactivé");adminProducts()});
}
function openProductForm(product){
  const isEdit=!!product;
  let variants=isEdit?product.variants.map(v=>({...v})):[{label:"Standard",code:"",purchase_price:0,sale_price:0,stock:0,min_stock:0,unit:"unité",volume_cl:null,photo_url:null}];
  const box=document.createElement("div");
  function vrow(v,i){return `<div class="variant-box" data-vi="${i}"><div class="row between" style="margin-bottom:12px"><span class="muted" style="font-size:12px;font-weight:700;text-transform:uppercase">Variante ${i+1}</span>${variants.length>1?`<button class="btn ghost sm" data-del-variant="${i}" style="padding:2px 6px">${icon("trash",16)}</button>`:""}</div><div class="form-grid"><label class="field"><span>Libellé</span><input class="input" data-f="label" value="${esc(v.label)}" placeholder="33 cl"></label><label class="field"><span>Code</span><input class="input" data-f="code" value="${esc(v.code||"")}" placeholder="COCA-33"></label><label class="field"><span>Prix d'achat (€)</span><input class="input" type="number" step="0.01" data-f="purchase_price" value="${v.purchase_price}"></label><label class="field"><span>Prix de vente (€)</span><input class="input" type="number" step="0.01" data-f="sale_price" value="${v.sale_price}"></label><label class="field"><span>Stock</span><input class="input" type="number" data-f="stock" value="${v.stock}"></label><label class="field"><span>Stock min (seuil)</span><input class="input" type="number" data-f="min_stock" value="${v.min_stock}"></label><label class="field"><span>Unité</span><input class="input" data-f="unit" value="${esc(v.unit)}" placeholder="canette"></label><label class="field"><span>Volume (cl)</span><input class="input" type="number" step="0.1" data-f="volume_cl" value="${v.volume_cl??""}" placeholder="33"></label></div></div>`}
  function paint(){
    box.innerHTML=`<div class="form-grid"><label class="field"><span>Nom du produit</span><input class="input" id="pf-name" value="${esc(product?.name||"")}" placeholder="Coca-Cola"></label><label class="field"><span>Catégorie</span><select class="select" id="pf-cat">${_catCache.map(c=>`<option value="${c.id}" ${product?.category_id===c.id?"selected":""}>${c.icon} ${esc(c.name)}</option>`).join("")}</select></label><label class="field full"><span>Description (optionnelle)</span><input class="input" id="pf-desc" value="${esc(product?.description||"")}"></label><label class="field"><span>Ordre d'affichage</span><input class="input" type="number" id="pf-order" value="${product?.display_order??0}"></label><div class="field row gap-3" style="align-items:center;padding-top:18px"><label class="row gap-2" style="cursor:pointer"><input type="checkbox" id="pf-active" ${product?.active!==false?"checked":""} style="width:18px;height:18px;accent-color:var(--violet)"> <span style="font-size:14px">Actif</span></label><label class="row gap-2" style="cursor:pointer"><input type="checkbox" id="pf-visible" ${product?.visible!==false?"checked":""} style="width:18px;height:18px;accent-color:var(--violet)"> <span style="font-size:14px">Visible menu</span></label></div></div><div class="row between" style="margin:6px 0 10px"><h3 class="violet-text" style="font-size:20px">Variantes</h3><button class="btn secondary sm" id="add-variant">${icon("plus",16)} Ajouter</button></div><div id="vlist">${variants.map(vrow).join("")}</div><div class="row gap-3" style="margin-top:10px"><button class="btn ghost" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn" style="flex:1" id="pf-save">Enregistrer</button></div>`;
    box.querySelector("#add-variant").onclick=()=>{readV();variants.push({label:"",code:"",purchase_price:0,sale_price:0,stock:0,min_stock:0,unit:"unité",volume_cl:null,photo_url:null});paint()};
    box.querySelectorAll("[data-del-variant]").forEach(b=>b.onclick=()=>{readV();variants.splice(+b.dataset.delVariant,1);paint()});
    box.querySelector("#pf-save").onclick=save;
  }
  function readV(){box.querySelectorAll("[data-vi]").forEach(row=>{const i=+row.dataset.vi;const v=variants[i];row.querySelectorAll("[data-f]").forEach(inp=>{const f=inp.dataset.f;if(["purchase_price","sale_price","stock","min_stock"].includes(f))v[f]=Number(inp.value)||0;else if(f==="volume_cl")v[f]=inp.value?Number(inp.value):null;else v[f]=inp.value||(f==="label"?"Standard":null)})})}
  async function save(){readV();const name=box.querySelector("#pf-name").value.trim();if(!name){toast("Le nom est obligatoire","error");return}
    const prod={id:product?.id,name,category_id:box.querySelector("#pf-cat").value,description:box.querySelector("#pf-desc").value||null,display_order:Number(box.querySelector("#pf-order").value)||0,active:box.querySelector("#pf-active").checked,visible:box.querySelector("#pf-visible").checked};
    try{await Products.save(prod,variants);toast(isEdit?"Produit mis à jour":"Produit créé");closeModal();adminProducts()}catch(e){toast(e.message,"error")}}
  paint();openModal({title:isEdit?"Modifier le produit":"Nouveau produit",body:box,wide:true});
}

/* STOCK */
let _stockRows=[];
async function adminStock(){
  const products=await Products.listAll();_stockRows=[];
  for(const p of products)for(const v of p.variants)_stockRows.push({variantId:v.id,name:p.name,label:v.label,stock:v.stock,min:v.min_stock});
  _stockRows.sort((a,b)=>(a.stock-a.min)-(b.stock-b.min));
  const body=_stockRows.map(r=>{const st=stockStatus(r.stock,r.min);return `<tr><td style="font-weight:600">${esc(r.name)}</td><td class="muted">${esc(r.label)}</td><td class="center fm" style="font-size:18px;font-weight:700">${r.stock}</td><td class="center fm muted">${r.min}</td><td class="center"><span class="badge ${st}">${st==="out"?"Rupture":st==="low"?"Bas":"OK"}</span></td><td style="text-align:right"><button class="btn secondary sm" data-restock="${r.variantId}">${icon("plus",14)} Réappro</button> <button class="btn ghost sm" data-correct="${r.variantId}">${icon("edit",14)}</button></td></tr>`}).join("");
  setAdminContent(pageHead("Stock","État des stocks en temps réel")+`<div class="card" style="overflow-x:auto"><table><thead><tr><th>Produit</th><th>Variante</th><th class="center">Stock</th><th class="center">Seuil</th><th class="center">État</th><th style="text-align:right">Actions</th></tr></thead><tbody>${body}</tbody></table></div>`);
  document.querySelectorAll("[data-restock]").forEach(b=>b.onclick=()=>openAdjust(b.dataset.restock,"add"));
  document.querySelectorAll("[data-correct]").forEach(b=>b.onclick=()=>openAdjust(b.dataset.correct,"set"));
}
function openAdjust(variantId,mode){
  const r=_stockRows.find(x=>x.variantId===variantId);const box=document.createElement("div");
  box.innerHTML=`<p class="muted" style="font-size:14px">${esc(r.name)} — ${esc(r.label)}<br>Stock actuel : <span class="fm" style="color:var(--text);font-weight:700">${r.stock}</span></p><label class="field" style="margin-top:14px"><span>${mode==="add"?"Quantité à ajouter":"Nouveau stock total"}</span><input class="input" type="number" id="adj-val" value="${mode==="set"?r.stock:0}"></label><p id="adj-prev" class="fm violet-text ${mode==="add"?"":"hidden"}" style="font-size:13px;margin-top:-6px"></p><label class="field"><span>Motif (optionnel)</span><input class="input" id="adj-reason" placeholder="${mode==="add"?"Livraison…":"Casse, erreur…"}"></label><div class="row gap-3"><button class="btn ghost" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn" style="flex:1" id="adj-save">Valider</button></div>`;
  const val=box.querySelector("#adj-val"),prev=box.querySelector("#adj-prev");
  function upd(){if(mode==="add")prev.textContent=`Nouveau stock : ${r.stock+(Number(val.value)||0)}`}val.oninput=upd;upd();
  box.querySelector("#adj-save").onclick=async()=>{try{await Stock.adjust({variantId,value:Number(val.value)||0,mode,type:mode==="add"?"restock":"correction",reason:box.querySelector("#adj-reason").value});toast("Stock mis à jour");closeModal();adminStock()}catch(e){toast(e.message,"error")}};
  openModal({title:mode==="add"?"Réapprovisionner":"Corriger le stock",body:box});
}
</script>
<script>
/* PRÉVISIONS */
let _fcProducts=[];const CAT_DRINK={bieres:"beer",softs:"soft",alcools:"alcohol"};
async function adminForecasts(){
  _fcProducts=await Products.listAll();
  setAdminContent(pageHead("Prévisions","Anticipe les besoins en stock")+`<div class="grid" style="grid-template-columns:320px 1fr;gap:24px;align-items:start"><div class="card pad"><h2 class="violet-text" style="font-size:24px;margin-bottom:16px">Paramètres</h2><label class="field"><span>Nombre de personnes</span><input class="input" type="number" id="f-people" value="200"></label><label class="field"><span>Nombre de jours</span><input class="input" type="number" id="f-days" value="1"></label><div class="divider"></div><p class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Conso / personne / jour</p><label class="field"><span>Bière (litres)</span><input class="input" type="number" step="0.1" id="f-beer" value="1.5"></label><label class="field"><span>Soft (litres)</span><input class="input" type="number" step="0.1" id="f-soft" value="0.5"></label><label class="field"><span>Alcool fort (litres)</span><input class="input" type="number" step="0.1" id="f-alc" value="0.2"></label></div><div class="card" style="overflow-x:auto" id="fc-result"></div></div>`);
  ["f-people","f-days","f-beer","f-soft","f-alc"].forEach(id=>document.getElementById(id).oninput=fcCompute);fcCompute();
}
function fcCompute(){
  const people=+document.getElementById("f-people").value||0,days=+document.getElementById("f-days").value||0;
  const liters={beer:(+document.getElementById("f-beer").value||0)*people*days,soft:(+document.getElementById("f-soft").value||0)*people*days,alcohol:(+document.getElementById("f-alc").value||0)*people*days};
  const rows=[];
  for(const type of["beer","soft","alcohol"]){const vs=[];for(const p of _fcProducts){const d=p.category?CAT_DRINK[p.category.slug]:null;if(d===type)p.variants.forEach(v=>vs.push({p,v}))}if(!vs.length)continue;const per=liters[type]/vs.length;for(const{p,v}of vs){const volL=v.volume_cl?v.volume_cl/100:null;const reco=volL?Math.ceil(per/volL):0;rows.push({name:p.name,label:v.label,reco,current:v.stock})}}
  const res=document.getElementById("fc-result");
  res.innerHTML=rows.length?`<table><thead><tr><th>Produit</th><th>Variante</th><th class="center">Recommandé</th><th class="center">En stock</th><th class="center">Manque</th></tr></thead><tbody>${rows.map(r=>{const miss=Math.max(0,r.reco-r.current);return `<tr><td style="font-weight:600">${esc(r.name)}</td><td class="muted">${esc(r.label)}</td><td class="center fm violet-text" style="font-weight:700">${r.reco}</td><td class="center fm">${r.current}</td><td class="center">${miss>0?`<span class="badge out">+${miss}</span>`:`<span class="badge ok">OK</span>`}</td></tr>`}).join("")}</tbody></table>`:`<p class="muted" style="padding:20px">Renseigne le volume (cl) des variantes de boissons pour activer le calcul.</p>`;
}

/* ACHATS */
let _puVariants=[],_puSuppliers=[];
async function adminPurchases(){
  const products=await Products.listAll();_puSuppliers=await Suppliers.list();_puVariants=[];
  for(const p of products)for(const v of p.variants)_puVariants.push({id:v.id,label:`${p.name} — ${v.label}`});
  const recent=await Stock.purchases(10);
  const recentHTML=recent.length?recent.map(p=>`<li class="row between" style="background:var(--bg);border-radius:10px;padding:9px 12px;margin-bottom:8px;list-style:none"><div><div style="font-size:14px">${esc(p.supplier?.name||"Sans fournisseur")}</div><div class="fm muted" style="font-size:12px">${fdate(p.purchase_date)} · ×${p.qty}</div></div><span class="fm violet-text" style="font-weight:700">${euro(p.total_cost)}</span></li>`).join(""):`<p class="center muted" style="padding:20px">Aucun achat</p>`;
  setAdminContent(pageHead("Achats","Saisie des achats fournisseurs")+`<div class="two-col"><div class="card pad"><h2 class="violet-text" style="font-size:24px;margin-bottom:16px">Nouvel achat</h2><label class="field"><span>Fournisseur</span><select class="select" id="pu-supplier"><option value="">— Aucun —</option>${_puSuppliers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join("")}</select></label><label class="field"><span>Produit / variante</span><select class="select" id="pu-variant">${_puVariants.map(o=>`<option value="${o.id}">${esc(o.label)}</option>`).join("")}</select></label><div class="form-grid"><label class="field"><span>Quantité</span><input class="input" type="number" id="pu-qty" value="1"></label><label class="field"><span>Prix unitaire (€)</span><input class="input" type="number" step="0.01" id="pu-price" value="0"></label><label class="field"><span>Référence</span><input class="input" id="pu-ref"></label><label class="field"><span>Date</span><input class="input" type="date" id="pu-date" value="${new Date().toISOString().slice(0,10)}"></label></div><div style="background:var(--bg);border-radius:10px;padding:12px;text-align:center;margin-bottom:14px"><span class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:1px">Coût total</span><div class="fm violet-text" style="font-size:26px;font-weight:700" id="pu-total">${euro(0)}</div></div><button class="btn lg block" id="pu-save">Enregistrer l'achat</button></div><div class="card pad"><h2 class="violet-text" style="font-size:24px;margin-bottom:16px">Achats récents</h2><ul style="padding:0;margin:0">${recentHTML}</ul></div></div>`);
  const qty=document.getElementById("pu-qty"),price=document.getElementById("pu-price"),total=document.getElementById("pu-total");
  const upd=()=>total.textContent=euro((+qty.value||0)*(+price.value||0));qty.oninput=upd;price.oninput=upd;
  document.getElementById("pu-save").onclick=async()=>{const variantId=document.getElementById("pu-variant").value;if(!variantId||(+qty.value||0)<=0){toast("Sélectionne un produit et une quantité valide","error");return}try{await Stock.recordPurchase({supplierId:document.getElementById("pu-supplier").value||null,variantId,qty:+qty.value,unitPrice:+price.value||0,supplierRef:document.getElementById("pu-ref").value,date:document.getElementById("pu-date").value});toast("Achat enregistré · stock réapprovisionné");adminPurchases()}catch(e){toast(e.message,"error")}};
}

/* FOURNISSEURS */
let _supCache=[];
async function adminSuppliers(){
  _supCache=await Suppliers.list();
  const cards=_supCache.length?_supCache.map(s=>`<div class="card pad"><div class="row between"><h3 class="fd" style="font-size:20px">${esc(s.name)}</h3><div class="row gap-2"><button class="btn ghost sm" data-edit-sup="${s.id}" style="padding:4px">${icon("edit",15)}</button><button class="btn ghost sm" data-del-sup="${s.id}" style="padding:4px">${icon("trash",15)}</button></div></div>${s.contact?`<p class="muted" style="font-size:14px;margin-top:4px">${esc(s.contact)}</p>`:""}<div style="margin-top:8px;font-size:14px" class="muted">${s.phone?`<div>📞 ${esc(s.phone)}</div>`:""}${s.email?`<div>✉️ ${esc(s.email)}</div>`:""}</div>${s.notes?`<p style="margin-top:8px;background:var(--bg);border-radius:8px;padding:8px;font-size:12px" class="muted">${esc(s.notes)}</p>`:""}</div>`).join(""):`<div class="card pad center"><p class="muted">Aucun fournisseur.</p></div>`;
  setAdminContent(pageHead("Fournisseurs","Carnet d'adresses",`<button class="btn" data-new-sup>${icon("plus",18)} Nouveau</button>`)+`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">${cards}</div>`);
  document.querySelector("[data-new-sup]").onclick=()=>openSupplierForm(null);
  document.querySelectorAll("[data-edit-sup]").forEach(b=>b.onclick=()=>openSupplierForm(_supCache.find(s=>s.id===b.dataset.editSup)));
  document.querySelectorAll("[data-del-sup]").forEach(b=>b.onclick=async()=>{if(confirm("Supprimer ce fournisseur ?")){await Suppliers.remove(b.dataset.delSup);toast("Fournisseur supprimé");adminSuppliers()}});
}
function openSupplierForm(s){
  const box=document.createElement("div");
  box.innerHTML=`<label class="field"><span>Nom</span><input class="input" id="s-name" value="${esc(s?.name||"")}"></label><label class="field"><span>Contact</span><input class="input" id="s-contact" value="${esc(s?.contact||"")}"></label><div class="form-grid"><label class="field"><span>Téléphone</span><input class="input" id="s-phone" value="${esc(s?.phone||"")}"></label><label class="field"><span>Email</span><input class="input" type="email" id="s-email" value="${esc(s?.email||"")}"></label></div><label class="field"><span>Notes</span><input class="input" id="s-notes" value="${esc(s?.notes||"")}"></label><div class="row gap-3"><button class="btn ghost" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn" style="flex:1" id="s-save">Enregistrer</button></div>`;
  box.querySelector("#s-save").onclick=async()=>{const name=box.querySelector("#s-name").value.trim();if(!name){toast("Le nom est obligatoire","error");return}try{await Suppliers.save({id:s?.id,name,contact:box.querySelector("#s-contact").value||null,phone:box.querySelector("#s-phone").value||null,email:box.querySelector("#s-email").value||null,notes:box.querySelector("#s-notes").value||null});toast(s?"Fournisseur mis à jour":"Fournisseur créé");closeModal();adminSuppliers()}catch(e){toast(e.message,"error")}};
  openModal({title:s?"Modifier le fournisseur":"Nouveau fournisseur",body:box});
