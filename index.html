/* HISTORIQUE */
let _histTab="ventes";
async function adminHistory(){
  setAdminContent(pageHead("Historique","Traçabilité complète")+`<div class="row wrap gap-3" style="margin-bottom:20px"><div class="row" style="border:1px solid var(--card-border);border-radius:10px;padding:4px"><button class="btn ${_histTab==="ventes"?"":"ghost"} sm" data-htab="ventes">Ventes</button><button class="btn ${_histTab==="mouvements"?"":"ghost"} sm" data-htab="mouvements">Mouvements stock</button></div><div class="row gap-2 muted" style="font-size:14px"><span>Du</span><input class="input" type="date" id="h-from" style="width:auto"><span>au</span><input class="input" type="date" id="h-to" style="width:auto"></div></div><div id="hist-result"><div class="center muted" style="padding:30px"><div class="spinner" style="margin:0 auto"></div></div></div>`);
  document.querySelectorAll("[data-htab]").forEach(b=>b.onclick=()=>{_histTab=b.dataset.htab;adminHistory()});
  const from=document.getElementById("h-from"),to=document.getElementById("h-to");from.onchange=load;to.onchange=load;
  async function load(){
    const res=document.getElementById("hist-result");
    if(_histTab==="ventes"){const sales=await Sales.list(from.value,to.value);
      res.innerHTML=sales.length?`<div class="card" style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Articles</th><th>Détail</th><th style="text-align:right">Total</th></tr></thead><tbody>${sales.map(s=>`<tr><td class="fm muted" style="font-size:12px;white-space:nowrap">${fdatetime(s.created_at)}</td><td>${s.item_count}</td><td class="muted" style="font-size:12px">${(s.items||[]).map(it=>`${esc(it.product_name)} ×${it.qty}`).join(", ")}</td><td style="text-align:right" class="fm violet-text">${euro(s.total)}</td></tr>`).join("")}</tbody></table></div>`:`<div class="card pad center"><p class="muted">Aucune vente.</p></div>`;
    }else{const moves=await Stock.movements();
      res.innerHTML=moves.length?`<div class="card" style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Produit</th><th>Type</th><th class="center">Variation</th><th class="center">Stock après</th><th>Motif</th></tr></thead><tbody>${moves.map(m=>`<tr><td class="fm muted" style="font-size:12px;white-space:nowrap">${fdatetime(m.created_at)}</td><td>${esc(m.variant?.product?.name||"—")} <span class="muted">${m.variant?.label?"— "+esc(m.variant.label):""}</span></td><td class="muted" style="font-size:14px">${movementLabel(m.type)}</td><td class="center fm" style="font-weight:700;color:${m.qty_delta<0?"var(--out)":"var(--ok)"}">${m.qty_delta>0?"+":""}${m.qty_delta}</td><td class="center fm">${m.stock_after}</td><td class="muted" style="font-size:12px">${esc(m.reason||"—")}</td></tr>`).join("")}</tbody></table></div>`:`<div class="card pad center"><p class="muted">Aucun mouvement.</p></div>`;
    }
  }
  load();
}

/* STATISTIQUES */
async function adminStats(){
  const [stats,top,daily]=await Promise.all([Stats.dashboard(),Stats.topProducts(8),Stats.dailyRevenue(14)]);
  const sc=(l,v)=>`<div class="card kpi"><div class="label">${l}</div><div class="value">${v}</div></div>`;
  const avg=stats.totalSales>0?stats.totalRevenue/stats.totalSales:0;
  const maxD=Math.max(1,...daily.map(d=>d.revenue));
  const dBars=daily.length?daily.map(d=>`<div class="bar-row"><span class="lbl fm">${d.day}</span><div class="bar-track"><div class="bar-fill" style="width:${(d.revenue/maxD*100).toFixed(1)}%"></div></div><span class="val">${euro(d.revenue)}</span></div>`).join(""):`<p class="center muted" style="padding:20px">Pas encore de données</p>`;
  const maxT=Math.max(1,...top.map(t=>t.qty));
  const tBars=top.length?top.map(t=>`<div class="bar-row"><span class="lbl">${esc(t.product_name)}</span><div class="bar-track"><div class="bar-fill" style="width:${(t.qty/maxT*100).toFixed(1)}%"></div></div><span class="val">${t.qty}</span></div>`).join(""):`<p class="center muted" style="padding:20px">Pas encore de données</p>`;
  const tTable=top.length?`<div class="card" style="overflow-x:auto;margin-top:24px"><table><thead><tr><th>Produit</th><th class="center">Quantité</th><th style="text-align:right">CA généré</th></tr></thead><tbody>${top.map(t=>`<tr><td>${esc(t.product_name)}</td><td class="center fm">${t.qty}</td><td style="text-align:right" class="fm violet-text">${euro(t.revenue)}</td></tr>`).join("")}</tbody></table></div>`:"";
  setAdminContent(pageHead("Statistiques","Performance des ventes")+`<div class="grid" style="gap:24px"><div class="kpi-grid">${sc("CA total",euro(stats.totalRevenue))}${sc("Ventes",stats.totalSales)}${sc("CA du jour",euro(stats.todayRevenue))}${sc("Panier moyen",euro(avg))}</div><div class="card pad"><h2 class="violet-text" style="font-size:24px;margin-bottom:18px">CA des 14 derniers jours</h2>${dBars}</div><div class="card pad"><h2 class="violet-text" style="font-size:24px;margin-bottom:18px">Top produits (quantités)</h2>${tBars}</div>${tTable}</div>`);
}

/* EXPORTS */
function csvCell(v){const s=v==null?"":String(v);return /[;"\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
function toCsv(rows){if(!rows.length)return"";const h=Object.keys(rows[0]);return "\uFEFF"+[h.join(";"),...rows.map(r=>h.map(k=>csvCell(r[k])).join(";"))].join("\n")}
function downloadCsv(fn,csv){const b=new Blob([csv],{type:"text/csv;charset=utf-8;"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fn;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u)}
async function adminExports(){
  const items=[{type:"stock",label:"État du stock",desc:"Stock actuel, seuils et prix.",icon:"boxes"},{type:"ventes",label:"Ventes",desc:"Toutes les lignes de vente.",icon:"cart"},{type:"achats",label:"Achats",desc:"Historique des achats fournisseurs.",icon:"bag"},{type:"mouvements",label:"Mouvements de stock",desc:"Journal complet.",icon:"history"}];
  setAdminContent(pageHead("Exports CSV","Pour ta compta & tes archives")+`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))">${items.map(e=>`<div class="card pad"><div class="row gap-4" style="align-items:flex-start"><div style="background:rgba(124,58,237,.15);border-radius:10px;padding:12px;color:var(--violet-light)">${icon(e.icon,24)}</div><div style="flex:1"><h3 class="fd" style="font-size:20px">${e.label}</h3><p class="muted" style="font-size:14px;margin-top:4px">${e.desc}</p><button class="btn secondary sm" data-export="${e.type}" style="margin-top:12px">${icon("download",16)} Télécharger</button></div></div></div>`).join("")}</div><p class="muted" style="font-size:12px;margin-top:24px">Fichiers UTF-8, séparateur « ; » — compatibles Excel / LibreOffice.</p>`);
  document.querySelectorAll("[data-export]").forEach(b=>b.onclick=async()=>{const type=b.dataset.export;try{let rows=[],fn="export.csv";
    if(type==="stock"){const products=await Products.listAll();for(const p of products)for(const v of p.variants)rows.push({Produit:p.name,Variante:v.label,Code:v.code||"",Stock:v.stock,Seuil:v.min_stock,"Prix vente":v.sale_price,"Prix achat":v.purchase_price});fn="stock.csv"}
    else if(type==="ventes"){const items=await Sales.allItems();rows=items.map(it=>({Date:fdatetime(it.created_at),Ticket:it.sale_id,Produit:it.product_name,"Quantité":it.qty,"Prix unitaire":it.unit_price,Total:it.line_total}));fn="ventes.csv"}
    else if(type==="achats"){const pu=await Stock.purchases(9999);rows=pu.map(p=>({Date:p.purchase_date,Fournisseur:p.supplier?.name||"","Quantité":p.qty,"Prix unitaire":p.unit_purchase_price,"Coût total":p.total_cost,"Référence":p.supplier_ref||""}));fn="achats.csv"}
    else{const mv=await Stock.movements();rows=mv.map(m=>({Date:fdatetime(m.created_at),Produit:m.variant?.product?.name||"",Variante:m.variant?.label||"",Type:m.type,Variation:m.qty_delta,"Stock après":m.stock_after,Motif:m.reason||""}));fn="mouvements.csv"}
    if(!rows.length){toast("Aucune donnée à exporter","error");return}downloadCsv(fn,toCsv(rows));toast("Export téléchargé : "+fn)}catch(e){toast(e.message,"error")}});
}

/* UTILISATEURS */
let _usersCache=[];
async function adminUsers(){
  _usersCache=await Users.list();
  const cards=_usersCache.map(u=>`<div class="card pad"><div class="row between"><div class="row gap-2"><span style="color:var(--violet-light)">${icon(u.role==="admin"?"users":"package",20)}</span><span class="fd" style="font-size:20px">${esc(u.username)}</span></div>${u.active?`<button class="btn ghost sm" data-deact="${u.id}" style="padding:4px">${icon("trash",15)}</button>`:`<button class="btn ghost sm" data-react="${u.id}" style="color:var(--violet-light)">Réactiver</button>`}</div><div class="row gap-2" style="margin-top:8px"><span class="badge violet">${u.role==="admin"?"Administrateur":"Barman"}</span>${!u.active?'<span class="badge out">Inactif</span>':""}</div><p class="muted" style="font-size:12px;margin-top:8px">Créé le ${fdate(u.created_at)}</p></div>`).join("");
  setAdminContent(pageHead("Utilisateurs","Admins & barmen",`<button class="btn" data-new-user>${icon("plus",18)} Nouvel utilisateur</button>`)+`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">${cards}</div>${DEMO_MODE?'<p class="muted" style="font-size:12px;margin-top:18px">ℹ️ En mode démo, les comptes créés sont fictifs. Configure Supabase pour de vrais comptes.</p>':""}`);
  document.querySelector("[data-new-user]").onclick=openUserForm;
  document.querySelectorAll("[data-deact]").forEach(b=>b.onclick=async()=>{const u=_usersCache.find(x=>x.id===b.dataset.deact);if(confirm(`Désactiver ${u.username} ?`)){await Users.setActive(u.id,false);toast("Utilisateur désactivé");adminUsers()}});
  document.querySelectorAll("[data-react]").forEach(b=>b.onclick=async()=>{await Users.setActive(b.dataset.react,true);toast("Utilisateur réactivé");adminUsers()});
}
function openUserForm(){
  let role="barman";const box=document.createElement("div");
  function paint(){
    box.innerHTML=`<div class="row" style="border:1px solid var(--card-border);border-radius:10px;padding:4px;margin-bottom:16px"><button class="btn ${role==="barman"?"":"ghost"} sm" style="flex:1" data-role="barman">🍺 Barman</button><button class="btn ${role==="admin"?"":"ghost"} sm" style="flex:1" data-role="admin">🔧 Admin</button></div><label class="field"><span>Nom d'utilisateur (affiché)</span><input class="input" id="u-name" placeholder="ex : Léo"></label><label class="field"><span>Email de connexion</span><input class="input" type="email" id="u-email" placeholder="leo@dahu.fr"></label><label class="field"><span>Mot de passe (6+ caractères)</span><input class="input" type="password" id="u-pass"></label><p class="muted" style="background:var(--bg);border-radius:8px;padding:12px;font-size:12px">${role==="barman"?"Le barman n'aura accès qu'à la caisse.":"L'admin aura accès à tout le back-office."} Transmets-lui ses identifiants.</p><div class="row gap-3"><button class="btn ghost" style="flex:1" onclick="closeModal()">Annuler</button><button class="btn" style="flex:1" id="u-save">Créer</button></div>`;
    box.querySelectorAll("[data-role]").forEach(b=>b.onclick=()=>{role=b.dataset.role;paint()});
    box.querySelector("#u-save").onclick=save;
  }
  async function save(){const username=box.querySelector("#u-name").value.trim(),email=box.querySelector("#u-email").value.trim(),password=box.querySelector("#u-pass").value;
    if(!username||!email||password.length<6){toast("Nom, email et mot de passe (6+) requis","error");return}
    try{const r=await Auth.createUser({username,email,password,role});if(r.error){toast(r.error,"error");return}toast(`Compte créé pour ${username}`);closeModal();adminUsers()}catch(e){toast(e.message,"error")}}
  paint();openModal({title:"Nouvel utilisateur",body:box});
}

/* ---------------- DÉMARRAGE ---------------- */
(function start(){
  if(!DEMO_MODE){
    // charge le SDK Supabase puis démarre
    const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";s.onload=boot;
    s.onerror=()=>{App.root.innerHTML=`<div class="center-screen"><p style="color:var(--out)">Impossible de charger Supabase. Vérifie ta connexion Internet.</p></div>`};
    document.head.appendChild(s);
  }else{
    boot();
  }
})();
</script>
