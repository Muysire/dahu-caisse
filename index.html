<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Dahu Caisse — Gestion de stock</title>
  <meta name="description" content="Caisse et gestion de stock — Dahu Sound System">
  <meta name="theme-color" content="#7c3aed">

  <!-- ========== FEUILLES DE STYLE (dans l'ordre) ========== -->
  <link rel="stylesheet" href="css/01-base.css">          <!-- variables, reset, typo  -->
  <link rel="stylesheet" href="css/02-components.css">    <!-- boutons, cartes, modales -->
  <link rel="stylesheet" href="css/03-layout-public.css"> <!-- login, menu, caisse      -->
  <link rel="stylesheet" href="css/04-layout-admin.css">  <!-- back-office              -->
</head>
<body>

  <!-- Toute l'application se dessine ici -->
  <div id="app">
    <div class="center-screen">
      <div class="spinner"></div>
      <p class="muted fm">Chargement…</p>
    </div>
  </div>

  <!-- ========== SCRIPTS ==========
       Ordre imposé : config → utils → ui → données → pages → routeur.
       On utilise des <script> classiques (pas de modules ES6) pour que
       le site fonctionne aussi en double-clic (protocole file://).
       ============================================================ -->

  <!-- 1. Noyau -->
  <script src="js/core/config.js"></script>        <!-- ← LE SEUL FICHIER À MODIFIER -->
  <script src="js/core/utils.js"></script>
  <script src="js/core/ui.js"></script>
  <script src="js/core/demo-data.js"></script>
  <script src="js/core/csv.js"></script>

  <!-- 2. Couche données -->
  <script src="js/core/data-auth.js"></script>
  <script src="js/core/data-catalog.js"></script>

  <!-- 3. Pages publiques -->
  <script src="js/pages/page-login.js"></script>
  <script src="js/pages/page-menu.js"></script>
  <script src="js/pages/page-caisse.js"></script>

  <!-- 4. Back-office -->
  <script src="js/admin/admin-shell.js"></script>
  <script src="js/admin/admin-dashboard.js"></script>
  <script src="js/admin/admin-products.js"></script>
  <script src="js/admin/admin-stock.js"></script>
  <script src="js/admin/admin-reports.js"></script>
  <script src="js/admin/admin-exports.js"></script>
  <script src="js/admin/admin-users.js"></script>

  <!-- 5. Routeur (démarre l'application) -->
  <script src="js/router.js"></script>

</body>
</html>
